<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hyperloop Control Panel</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
      text-align: center;
      overflow: hidden;
    }

    h1 { margin-top: 20px; }

    #status { margin: 10px; font-weight: bold; }

    /* Background bubbles */
    #bg {
      position: fixed;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      animation: float 10s infinite ease-in-out;
    }

    @keyframes float {
      50% { transform: translateY(-40px); }
    }

    /* Gauge */
    .gauge {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 8px solid rgba(255,255,255,0.1);
      margin: 20px auto;
      position: relative;
      backdrop-filter: blur(10px);
    }

    .needle {
      width: 4px;
      height: 90px;
      background: red;
      position: absolute;
      bottom: 50%;
      left: 50%;
      transform-origin: bottom;
      transform: rotate(-90deg);
      transition: transform 0.5s ease;
    }

    .center {
      width: 12px;
      height: 12px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* Cards */
    .card {
      display: inline-block;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      margin: 10px;
      border-radius: 12px;
      width: 160px;
    }

    .value { font-size: 22px; }

    .green { color: #22c55e; }
    .yellow { color: #eab308; }
    .red { color: #ef4444; }

    button {
      padding: 10px;
      margin: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .start { background: green; }
    .stop { background: orange; }
    .emergency { background: red; }
    .reset { background: blue; }

    #warning {
      color: red;
      display: none;
      animation: blink 1s infinite;
    }

    @keyframes blink { 50% { opacity: 0.3; } }

    /* Cursor glow */
    #cursorGlow {
      position: fixed;
      width: 15px;
      height: 15px;
      background: cyan;
      border-radius: 50%;
      pointer-events: none;
    }
  </style>
</head>

<body>

<div id="bg"></div>
<div id="cursorGlow"></div>

<h1>🚄 Hyperloop Control Panel</h1>
<p id="status">Status: OFF</p>

<!-- SPEEDOMETER -->
<div class="gauge">
  <div class="needle" id="needle"></div>
  <div class="center"></div>
</div>

<!-- CARDS -->
<div>
  <div class="card">
    <p>Speed (km/h)</p>
    <p id="speed" class="value">0</p>
  </div>

  <div class="card">
    <p>Pressure (Pa)</p>
    <p id="pressure" class="value">100</p>
  </div>

  <div class="card">
    <p>Temperature (°C)</p>
    <p id="temp" class="value">25</p>
  </div>

  <div class="card">
    <p>Battery (%)</p>
    <p id="battery" class="value">100</p>
  </div>
</div>

<div>
  <button class="start" onclick="start()">Start</button>
  <button class="stop" onclick="stop()">Stop</button>
  <button class="emergency" onclick="emergency()">Emergency</button>
  <button class="reset" onclick="reset()">Reset</button>
</div>

<div id="warning">⚠ HIGH PRESSURE!</div>

<script>
  // Bubbles
  const bg = document.getElementById("bg");
  for (let i = 0; i < 12; i++) {
    let b = document.createElement("div");
    b.className = "bubble";
    b.style.width = b.style.height = Math.random()*60+30+"px";
    b.style.left = Math.random()*100+"vw";
    b.style.top = Math.random()*100+"vh";
    bg.appendChild(b);
  }

  // Cursor glow
  const glow = document.getElementById("cursorGlow");
  document.addEventListener("mousemove", e => {
    glow.style.left = e.clientX+"px";
    glow.style.top = e.clientY+"px";
  });

  // System
  let speed=0, pressure=100, temp=25, battery=100;
  let running=false, emergencyMode=false;
  let interval;

  function updateUI() {
    speedEl.innerText = speed;
    pressureEl.innerText = pressure;
    tempEl.innerText = temp;
    batteryEl.innerText = Math.round(battery);

    status.innerText =
      emergencyMode ? "EMERGENCY" :
      running ? "RUNNING" : "STOPPED";

    // Gauge rotation (-90 to +90 deg)
    let angle = (speed / 1200) * 180 - 90;
    needle.style.transform = `rotate(${angle}deg)`;

    warning.style.display = pressure > 120 ? "block" : "none";
  }

  function simulate() {
    if (!running || emergencyMode) return;

    speed += (Math.random()-0.5)*20;
    pressure += (Math.random()-0.5)*5;
    temp += (Math.random()-0.5)*2;
    battery -= Math.random()*0.3;

    speed = Math.max(0, Math.min(1200, speed));
    pressure = Math.max(0, Math.min(200, pressure));
    temp = Math.max(0, Math.min(100, temp));
    battery = Math.max(0, battery);

    speed = Math.round(speed);
    pressure = Math.round(pressure);
    temp = Math.round(temp);

    updateUI();
  }

  function start() {
    if (emergencyMode) return;
    running = true;
    interval = setInterval(simulate, 1000);
  }

  function stop() {
    running = false;
    clearInterval(interval);
  }

  function emergency() {
    emergencyMode = true;
    running = false;
    speed = 0;
    clearInterval(interval);
    updateUI();
  }

  function reset() {
    emergencyMode = false;
  }

  const speedEl = document.getElementById("speed");
  const pressureEl = document.getElementById("pressure");
  const tempEl = document.getElementById("temp");
  const batteryEl = document.getElementById("battery");
  const status = document.getElementById("status");
  const needle = document.getElementById("needle");
  const warning = document.getElementById("warning");

  updateUI();
</script>

</body>
</html>
